<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple ETF Calculator</title>
    <!-- Modern design styles -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-1 text-emerald-400">📈 ETF Planner</h1>
        <p class="text-slate-400 text-xs text-center mb-6">Fortnightly Inflow-Only Calculator</p>

        <!-- Section 1: Set Target Percentages -->
        <div class="space-y-3 mb-6 bg-slate-900/40 p-4 rounded-xl border border-slate-700/50">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Your Target Percentages (%)</h2>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 text-center font-medium">VGS Target %</label>
                    <input type="number" id="vgsTarget" value="45" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-center font-bold text-sm focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 text-center font-medium">NDQ Target %</label>
                    <input type="number" id="ndqTarget" value="35" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-center font-bold text-sm focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 text-center font-medium">VAS Target %</label>
                    <input type="number" id="vasTarget" value="20" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-center font-bold text-sm focus:outline-none focus:border-emerald-500">
                </div>
            </div>
            <div id="targetWarning" class="text-[11px] text-rose-400 text-center font-medium hidden">⚠️ Targets must add up to exactly 100%</div>
        </div>

        <!-- Section 2: Input Current Balances -->
        <div class="space-y-4 mb-6">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">1. Current Portfolio Balances ($)</h2>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs text-slate-400 mb-1 font-medium">VGS Balance</label>
                    <input type="number" id="vgsCurrent" value="4500" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-center font-semibold focus:outline-none focus:border-emerald-500">
                    <div class="text-[10px] text-slate-400 text-center mt-1">Holding: <span id="vgsCurrentPct" class="font-bold text-emerald-400">0.0%</span></div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 font-medium">NDQ Balance</label>
                    <input type="number" id="ndqCurrent" value="3500" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-center font-semibold focus:outline-none focus:border-emerald-500">
                    <div class="text-[10px] text-slate-400 text-center mt-1">Holding: <span id="ndqCurrentPct" class="font-bold text-emerald-400">0.0%</span></div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 font-medium">VAS Balance</label>
                    <input type="number" id="vasCurrent" value="2000" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-center font-semibold focus:outline-none focus:border-emerald-500">
                    <div class="text-[10px] text-slate-400 text-center mt-1">Holding: <span id="vasCurrentPct" class="font-bold text-emerald-400">0.0%</span></div>
                </div>
            </div>
        </div>

        <!-- Section 3: Input New Cash -->
        <div class="mb-6">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">2. New Cash to Deposit ($)</h2>
            <input type="number" id="newDeposit" value="1000" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xl text-center font-bold text-emerald-400 focus:outline-none focus:border-emerald-500">
        </div>

        <!-- Section 4: Output Display -->
        <div class="bg-slate-950 rounded-xl p-4 border border-slate-700 space-y-3">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">3. Today's Buy Orders</h2>
            
            <div class="flex justify-between items-center p-2 bg-slate-900 rounded-lg border border-slate-800">
                <span class="font-bold text-slate-300">🛒 BUY VGS:</span>
                <span id="vgsBuy" class="text-xl font-black text-emerald-400">$0.00</span>
            </div>
            <div class="flex justify-between items-center p-2 bg-slate-900 rounded-lg border border-slate-800">
                <span class="font-bold text-slate-300">🛒 BUY NDQ:</span>
                <span id="ndqBuy" class="text-xl font-black text-emerald-400">$0.00</span>
            </div>
            <div class="flex justify-between items-center p-2 bg-slate-900 rounded-lg border border-slate-800">
                <span class="font-bold text-slate-300">🛒 BUY VAS:</span>
                <span id="vasBuy" class="text-xl font-black text-emerald-400">$0.00</span>
            </div>
        </div>
    </div>

    <!-- The Math Calculations -->
    <script>
        function calculate() {
            // 1. Read targets from screen
            const vgsT = (parseFloat(document.getElementById('vgsTarget').value) || 0) / 100;
            const ndqT = (parseFloat(document.getElementById('ndqTarget').value) || 0) / 100;
            const vasT = (parseFloat(document.getElementById('vasTarget').value) || 0) / 100;

            // Show a warning line if targets do not sum up to 100%
            const totalTargetPct = vgsT + ndqT + vasT;
            const warningEl = document.getElementById('targetWarning');
            if (Math.abs(totalTargetPct - 1.0) > 0.001) {
                warningEl.classList.remove('hidden');
            } else {
                warningEl.classList.add('hidden');
            }

            // 2. Read entered money values
            const vgsCurrent = parseFloat(document.getElementById('vgsCurrent').value) || 0;
            const ndqCurrent = parseFloat(document.getElementById('ndqCurrent').value) || 0;
            const vasCurrent = parseFloat(document.getElementById('vasCurrent').value) || 0;
            const newDeposit = parseFloat(document.getElementById('newDeposit').value) || 0;

            const currentTotal = vgsCurrent + ndqCurrent + vasCurrent;
            const targetTotal = currentTotal + newDeposit;

            // 3. Update current live percentage displays
            if (currentTotal > 0) {
                document.getElementById('vgsCurrentPct').innerText = ((vgsCurrent / currentTotal) * 100).toFixed(1) + '%';
                document.getElementById('ndqCurrentPct').innerText = ((ndqCurrent / currentTotal) * 100).toFixed(1) + '%';
                document.getElementById('vasCurrentPct').innerText = ((vasCurrent / currentTotal) * 100).toFixed(1) + '%';
            } else {
                document.getElementById('vgsCurrentPct').innerText = '0.0%';
                document.getElementById('ndqCurrentPct').innerText = '0.0%';
                document.getElementById('vasCurrentPct').innerText = '0.0%';
            }

            // 4. Run the rebalancing math
            let shortfalls = {
                vgs: Math.max(0, (targetTotal * vgsT) - vgsCurrent),
                ndq: Math.max(0, (targetTotal * ndqT) - ndqCurrent),
                vas: Math.max(0, (targetTotal * vasT) - vasCurrent)
            };

            const totalShortfall = shortfalls.vgs + shortfalls.ndq + shortfalls.vas;

            let buys = {};
            if (totalShortfall > 0) {
                buys.vgs = (shortfalls.vgs / totalShortfall) * newDeposit;
                buys.ndq = (shortfalls.ndq / totalShortfall) * newDeposit;
                buys.vas = (shortfalls.vas / totalShortfall) * newDeposit;
            } else {
                buys.vgs = newDeposit * vgsT;
                buys.ndq = newDeposit * ndqT;
                buys.vas = newDeposit * vasT;
            }

            // 5. Update the display orders screen
            document.getElementById('vgsBuy').innerText = '$' + buys.vgs.toFixed(2);
            document.getElementById('ndqBuy').innerText = '$' + buys.ndq.toFixed(2);
            document.getElementById('vasBuy').innerText = '$' + buys.vas.toFixed(2);
        }

        // Make the calculation run instantly every time a user types a character
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', calculate);
        });

        // Run calculations immediately when the page loads
        calculate();
    </script>
</body>
</html>
